  .cart-bar-left{ display:flex; align-items:center; gap:10px; }

  .loading-screen{
    display:flex; align-items:center; justify-content:center;
    height:100vh; flex-direction:column; gap:12px; color:var(--ink-soft);
  }
</style>

/* ---------------------------------------------------
   สร้างข้อความสรุปออเดอร์
--------------------------------------------------- */
function buildOrderMessage(order) {
  const pickupText =
    order.pickup.type === "now"
      ? "รับทันที"
      : `${order.pickup.date} เวลา ${order.pickup.time} น.`;

  const lines = [];
  lines.push(`🧾 ออเดอร์ #${order.orderId}`);
  lines.push("------------------------------");
  for (const item of order.items) {
    lines.push(`• ${item.name} x${item.qty} (${item.sweetness}) - ${item.price * item.qty} บาท`);
  }
lines.push("------------------------------");
  if (order.discount) {
    lines.push(`ยอดก่อนลด: ${order.subtotal} บาท`);
    lines.push(`ส่วนลดรับเองที่ร้าน 30%: -${order.discount} บาท`);
  }
  lines.push(`💰 รวม: ${order.total} บาท`);
  lines.push(`⏰ รับ: ${pickupText}`);
  lines.push(`💳 ชำระ: ${order.payment === "qr" ? "สแกนจ่าย (QR/พร้อมเพย์)" : "เงินสดหน้าร้าน"}`);

  return lines.join("\n");
}

/* ---------------------------------------------------
   ส่งข้อความสรุปออเดอร์เข้าห้องแชท LINE OA ของลูกค้าคนนั้น
   ใช้ liff.sendMessages() — ใช้ได้เมื่อเปิดผ่าน LINE app (isInClient)
   และเปิดสิทธิ์ "Chat message" (chat_message.write) ใน LIFF app แล้ว
--------------------------------------------------- */
async function sendOrderToLine(order) {
  if (typeof liff === "undefined" || !liff.isInClient || !liff.isInClient()) {
    return { ok: false, reason: "not_in_client" };
  }
  try {
    await liff.sendMessages([
      { type: "text", text: buildOrderMessage(order) },
    ]);
    return { ok: true };
  } catch (e) {
    console.error("ส่งข้อความเข้า LINE ไม่สำเร็จ:", e);
    return { ok: false, reason: "send_failed", error: e };
  }
}

          <div className="item-price mono">{formatPrice(item.price)} บาท</div>
          <p className="item-desc">{item.desc}</p>

          <div className="section-label">ระดับความหวาน</div>
          <div className="option-grid">
            {SWEETNESS_OPTIONS.map((s) => (
              <div
                key={s}
                className={"option-pill" + (sweetness === s ? " active" : "")}
                onClick={() => setSweetness(s)}
              >
                {s}
              </div>
            ))}
          </div>

          <div className="section-label">จำนวน</div>
          <div className="qty-row">
            <div className="qty-control">
              <div className="qty-btn" onClick={() => setQty(Math.max(1, qty - 1))}>–</div>
              <div className="qty-val">{qty}</div>
              <div className="qty-btn" onClick={() => setQty(qty + 1)}>+</div>
            </div>
            <div className="mono" style={{fontWeight:700, fontSize:18}}>
              {formatPrice(item.price * qty)} บาท
            </div>
          </div>

          <button
            className="primary-btn"
            onClick={() => {
              onAdd({
                id: Date.now() + "_" + item.id,
                menuId: item.id,
                name: item.name,
                price: item.price,
                qty,
                sweetness,
              });
              onClose();
            }}
          >
            <span>เพิ่มลงตะกร้า</span>
            <span className="mono">{formatPrice(item.price * qty)} บาท</span>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ===================================================
   CHECKOUT SHEET
=================================================== */
function CheckoutSheet({ cart, total, onClose, onRemove, onConfirm }) {
  const discount = Math.round(total * DISCOUNT_RATE);
  const finalTotal = total - discount;
  const [step, setStep] = useState("cart"); // cart -> success
  const [pickupType, setPickupType] = useState("now"); // now | scheduled
  const [pickupDate, setPickupDate] = useState("");
  const [pickupTime, setPickupTime] = useState("");
  const [payment, setPayment] = useState("qr"); // qr | cash
  const [orderId, setOrderId] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [lineStatus, setLineStatus] = useState(null); // null | "ok" | "failed"

  const todayStr = new Date().toISOString().split("T")[0];

  const canConfirm =
    cart.length > 0 &&
    !submitting &&
    (pickupType === "now" || (pickupDate && pickupTime));

  const handleConfirm = async () => {
    setSubmitting(true);
    const id = "CF" + Math.floor(100000 + Math.random() * 900000);
    const order = {
      orderId: id,
      items: cart,
      total,
      pickup:
        pickupType === "now"
          ? { type: "now" }
          : { type: "scheduled", date: pickupDate, time: pickupTime },
      payment,
      createdAt: new Date().toISOString(),
    };

    const result = await sendOrderToLine(order);
    setLineStatus(result.ok ? "ok" : "failed");
    setOrderId(id);
    onConfirm(order);
    setStep("success");
    setSubmitting(false);
  };

  if (step === "success") {
    return (
      <div className="overlay">
        <div className="sheet">
          <div className="sheet-handle"></div>
          <div className="success-wrap">
            <div className={"success-icon" + (lineStatus === "failed" ? " warn" : "")}>
              {lineStatus === "failed" ? "!" : "✓"}
            </div>
            <div className="success-title display">
              {lineStatus === "failed" ? "บันทึกออเดอร์แล้ว" : "สั่งออเดอร์เรียบร้อย!"}
            </div>
            <div className="success-sub">
              {lineStatus === "ok" && (
                <>ระบบได้ส่งสรุปออเดอร์เข้าแชทไลน์ของร้านให้แล้ว<br/></>
              )}
              {lineStatus === "failed" && (
                <>ไม่สามารถส่งสรุปออเดอร์เข้าไลน์ได้ในขณะนี้ กรุณาแคปหน้าจอนี้แจ้งร้านโดยตรง<br/></>
              )}
              {pickupType === "now"
                ? "กรุณารอรับที่ร้านได้ทันที"
                : `กรุณามารับเครื่องดื่มวันที่ ${pickupDate} เวลา ${pickupTime} น.`}
            </div>
            <div className="order-id mono">เลขที่ออเดอร์ #{orderId}</div>
            <button className="primary-btn" style={{justifyContent:"center"}} onClick={onClose}>
              กลับสู่หน้าเมนู
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-close" onClick={onClose}>✕</div>
        <div className="sheet-handle"></div>

        {/* Receipt */}
        <div className="receipt">
          <div className="receipt-title">รายการสั่งซื้อ</div>
          {cart.length === 0 && (
            <div style={{textAlign:"center", color:"var(--ink-soft)", fontSize:13, padding:"10px 0"}}>
              ตะกร้าว่างเปล่า
            </div>
          )}
          {cart.map((c) => (
            <div className="receipt-line" key={c.id}>
              <div className="receipt-line-main">
                <div className="receipt-line-name">{c.name} ×{c.qty}</div>
                <div className="receipt-line-meta">ความหวาน: {c.sweetness}</div>
                <div className="receipt-remove" onClick={() => onRemove(c.id)}>ลบรายการนี้</div>
              </div>
              <div className="receipt-line-price mono">{formatPrice(c.price * c.qty)}</div>
            </div>
          ))}
          {cart.length > 0 && (
            <>
              <div className="receipt-line" style={{borderBottom:"none", color:"var(--ink-soft)"}}>
                <div className="receipt-line-main">ยอดก่อนลด</div>
                <div className="receipt-line-price mono">{formatPrice(total)}</div>
              </div>
              <div className="receipt-line" style={{borderBottom:"none", color:"var(--terracotta)"}}>
                <div className="receipt-line-main">ส่วนลดรับเองที่ร้าน 30%</div>
                <div className="receipt-line-price mono">-{formatPrice(discount)}</div>
              </div>
              <div className="receipt-total-row">
                <span>ยอดสุทธิ</span>
                <span className="mono">{formatPrice(finalTotal)} บาท</span>
              </div>
            </>
          )}
        </div>
        <div className="perf"></div>

        {/* Pickup time */}
        <div className="checkout-section">
          <div className="section-label">เวลารับเครื่องดื่ม</div>
          <div className="pickup-grid">
            <div
              className={"pickup-card" + (pickupType === "now" ? " active" : "")}
              onClick={() => setPickupType("now")}
            >
              <div className="pickup-card-title">รับทันที</div>
              <div className="pickup-card-sub">ร้านจะเริ่มทำเครื่องดื่มทันทีที่ได้รับออเดอร์</div>
            </div>
            <div
              className={"pickup-card" + (pickupType === "scheduled" ? " active" : "")}
              onClick={() => setPickupType("scheduled")}
            >
              <div className="pickup-card-title">นัดรับล่วงหน้า</div>
              <div className="pickup-card-sub">เลือกวันและเวลาที่ต้องการมารับ</div>
              {pickupType === "scheduled" && (
                <div className="pickup-inputs" onClick={(e) => e.stopPropagation()}>
                  <input
                    type="date"
                    min={todayStr}
                    value={pickupDate}
                    onChange={(e) => setPickupDate(e.target.value)}
                  />
                  <input
                    type="time"
                    value={pickupTime}
                    onChange={(e) => setPickupTime(e.target.value)}
                  />
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Payment */}
        <div className="checkout-section">
          <div className="section-label">วิธีชำระเงิน</div>
          <div className="pay-grid">
            <div
              className={"pickup-card" + (payment === "qr" ? " active" : "")}
              onClick={() => setPayment("qr")}
            >
              <div className="pickup-card-title">สแกนจ่าย (พร้อมเพย์ / QR)</div>
              <div className="pickup-card-sub">ชำระผ่าน QR Code ก่อนเข้ารับสินค้า</div>
            </div>
            <div
              className={"pickup-card" + (payment === "cash" ? " active" : "")}
              onClick={() => setPayment("cash")}
            >
              <div className="pickup-card-title">เงินสดหน้าร้าน</div>
              <div className="pickup-card-sub">ชำระเงินสดเมื่อมารับเครื่องดื่ม</div>
            </div>
          </div>
        </div>

        <div className="checkout-section" style={{paddingBottom:24}}>
          <button className="primary-btn" disabled={!canConfirm} onClick={handleConfirm}>
            <span>{submitting ? "กำลังส่งออเดอร์..." : "ยืนยันการสั่งซื้อ"}</span>
            <span className="mono">{formatPrice(finalTotal)} บาท</span>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ===================================================
   CUSTOMER MENU PAGE
=================================================== */
function MenuPage({ menu, onGoAdmin }) {
  const categories = useMemo(() => {
    const set = new Set(menu.map((m) => m.category));
    return ["ทั้งหมด", ...Array.from(set)];
  }, [menu]);

  const [activeCat, setActiveCat] = useState("ทั้งหมด");
  const [selectedItem, setSelectedItem] = useState(null);
  const [cart, setCart] = useState([]);
  const [showCheckout, setShowCheckout] = useState(false);

  const filtered = menu.filter(
    (m) => activeCat === "ทั้งหมด" || m.category === activeCat
  );

  const total = cart.reduce((sum, c) => sum + c.price * c.qty, 0);
  const cartCount = cart.reduce((sum, c) => sum + c.qty, 0);

  const handleAdd = (entry) => setCart((prev) => [...prev, entry]);
  const handleRemove = (id) => setCart((prev) => prev.filter((c) => c.id !== id));

  const handleConfirmOrder = (order) => {
    setCart([]);
  };

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-row">
          <div>
            <div className="brand-eyebrow">รับเอง ลดราคา 30%</div>
            <div className="brand display">เลิฟชาไทย</div>
          </div>
          <a className="admin-link" href="#" onClick={(e) => { e.preventDefault(); onGoAdmin(); }}>
            ⚙ จัดการเมนู
          </a>
        </div>
        <div className="chips">
          {categories.map((c) => (
            <div
              key={c}
              className={"chip" + (activeCat === c ? " active" : "")}
              onClick={() => setActiveCat(c)}
            >
              {c}
            </div>
          ))}
        </div>
      </div>

      <div className="menu-list">
        {filtered.length === 0 && (
          <div className="empty-state">
            <div className="display">ยังไม่มีเมนูในหมวดนี้</div>
            <div>ลองเลือกหมวดหมู่อื่นดูนะคะ</div>
          </div>
        )}
        {filtered.map((item) => (
          <div
            key={item.id}
            className={"menu-card" + (item.soldOut ? " soldout" : "")}
            onClick={() => !item.soldOut && setSelectedItem(item)}
          >
            <img src={item.image} alt={item.name} />
            <div className="menu-card-body">
              {item.soldOut && <span className="soldout-tag">หมดชั่วคราว</span>}
              <div className="menu-card-name">{item.name}</div>
              <div className="menu-card-desc">{item.desc}</div>
              <div className="menu-card-price mono">{formatPrice(item.price)} บาท</div>
            </div>
          </div>
        ))}
      </div>

      {cartCount > 0 && (
        <div className="cart-bar" onClick={() => setShowCheckout(true)}>
          <div className="cart-bar-left">
            <div className="cart-badge">{cartCount}</div>
            <div className="cart-bar-text">ดูตะกร้า / เช็คเอาท์</div>
          </div>
          <div className="cart-bar-total mono">{formatPrice(Math.round(total * (1 - DISCOUNT_RATE)))} บาท</div>
        </div>
      )}

      {selectedItem && (
        <ItemSheet
          item={selectedItem}
          onClose={() => setSelectedItem(null)}
          onAdd={handleAdd}
        />
      )}

      {showCheckout && (
        <CheckoutSheet
          cart={cart}
          total={total}
          onClose={() => setShowCheckout(false)}
          onRemove={handleRemove}
          onConfirm={handleConfirmOrder}
        />
      )}
    </div>
  );
}

/* ===================================================
   ADMIN LOGIN GATE
=================================================== */
function AdminLogin({ onSuccess, onBack }) {
  const [code, setCode] = useState("");
  const [error, setError] = useState(false);

  const submit = () => {
    if (code === ADMIN_PASSCODE) {
      onSuccess();
    } else {
      setError(true);
      setCode("");
    }
  };

  return (
    <div className="app">
      <div className="admin-bar">
        <div>
          <div className="brand-eyebrow">Admin</div>
          <div className="brand display" style={{fontSize:22}}>เข้าสู่ระบบจัดการ</div>
        </div>
        <a className="admin-link" href="#" onClick={(e) => { e.preventDefault(); onBack(); }}>← กลับหน้าร้าน</a>
      </div>
      <div className="checkout-section" style={{paddingTop:40}}>
        <div className="form-field">
          <label className="form-label">รหัสผ่านสำหรับเจ้าของร้าน</label>
          <input
            className="form-input"
            type="password"
            inputMode="numeric"
            value={code}
            onChange={(e) => { setCode(e.target.value); setError(false); }}
            onKeyDown={(e) => e.key === "Enter" && submit()}
            placeholder="กรอกรหัสผ่าน"
            autoFocus
          />
          {error && (
            <div style={{color:"var(--terracotta)", fontSize:12.5, marginTop:8, fontWeight:600}}>
              รหัสผ่านไม่ถูกต้อง กรุณาลองอีกครั้ง
            </div>
          )}
        </div>
        <button className="primary-btn" style={{justifyContent:"center", marginTop:6}} onClick={submit}>
          เข้าสู่ระบบ
        </button>
      </div>
    </div>
  );
}

/* ===================================================
   ADMIN PAGE
=================================================== */
const EMPTY_FORM = { name: "", price: "", category: "", desc: "", image: "", soldOut: false };

function AdminPage({ menu, setMenu, onBack }) {
  const [editing, setEditing] = useState(null); // item id or "new" or null
  const [form, setForm] = useState(EMPTY_FORM);

  const startEdit = (item) => {
    setEditing(item.id);
    setForm({ ...item, price: String(item.price) });
  };
  const startNew = () => {
    setEditing("new");
    setForm(EMPTY_FORM);
  };
  const cancelEdit = () => { setEditing(null); setForm(EMPTY_FORM); };

  const save = () => {
    if (!form.name || !form.price) return;
    if (editing === "new") {
      const newItem = {
        ...form,
        id: "m" + Date.now(),
        price: Number(form.price) || 0,
        category: form.category || "อื่นๆ",
        image: form.image || "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&h=400&fit=crop",
        soldOut: !!form.soldOut,
      };
      setMenu([...menu, newItem]);
    } else {
      setMenu(menu.map((m) => (m.id === editing ? { ...m, ...form, price: Number(form.price) || 0 } : m)));
    }
    cancelEdit();
  };

  const remove = (id) => {
    if (confirm("ต้องการลบเมนูนี้ใช่หรือไม่?")) {
      setMenu(menu.filter((m) => m.id !== id));
    }
  };

  const toggleSoldOut = (id) => {
    setMenu(menu.map((m) => (m.id === id ? { ...m, soldOut: !m.soldOut } : m)));
  };

  if (editing) {
    return (
      <div className="app">
        <div className="admin-bar">
          <div className="brand display" style={{fontSize:22}}>
            {editing === "new" ? "เพิ่มเมนูใหม่" : "แก้ไขเมนู"}
          </div>
          <a className="admin-link" href="#" onClick={(e) => { e.preventDefault(); cancelEdit(); }}>ยกเลิก</a>
        </div>
        <div className="checkout-section" style={{paddingTop:18}}>
          <div className="form-field">
            <label className="form-label">ชื่อเมนู</label>
            <input className="form-input" value={form.name}
              onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="เช่น มัทฉะลาเต้" />
          </div>
          <div className="form-field">
            <label className="form-label">ราคา (บาท)</label>
            <input className="form-input" type="number" value={form.price}
              onChange={(e) => setForm({ ...form, price: e.target.value })} placeholder="65" />
          </div>
          <div className="form-field">
            <label className="form-label">หมวดหมู่</label>
            <input className="form-input" value={form.category}
              onChange={(e) => setForm({ ...form, category: e.target.value })} placeholder="ชา / กาแฟ / เครื่องดื่มอื่นๆ" />
          </div>
          <div className="form-field">
            <label className="form-label">คำอธิบาย</label>
            <textarea className="form-textarea" rows="3" value={form.desc}
              onChange={(e) => setForm({ ...form, desc: e.target.value })} placeholder="บอกลูกค้าว่าเครื่องดื่มนี้เป็นอย่างไร" />
          </div>
          <div className="form-field">
            <label className="form-label">URL รูปภาพ</label>
            <input className="form-input" value={form.image}
              onChange={(e) => setForm({ ...form, image: e.target.value })} placeholder="https://..." />
          </div>
          <div className="form-field" style={{display:"flex", alignItems:"center", gap:10}}>
            <input type="checkbox" id="soldout" checked={!!form.soldOut}
              onChange={(e) => setForm({ ...form, soldOut: e.target.checked })} style={{width:18,height:18}} />
            <label htmlFor="soldout" className="form-label" style={{margin:0}}>เมนูนี้หมดชั่วคราว</label>
          </div>
          <button className="primary-btn" style={{justifyContent:"center", marginTop:6}} onClick={save}>
            บันทึกเมนู
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <div className="admin-bar">
        <div>
          <div className="brand-eyebrow">Admin</div>
          <div className="brand display" style={{fontSize:22}}>จัดการเมนู</div>
        </div>
        <a className="admin-link" href="#" onClick={(e) => { e.preventDefault(); onBack(); }}>← กลับหน้าร้าน</a>
      </div>
      <div className="admin-list">
        {menu.map((item) => (
          <div className="admin-card" key={item.id}>
            <img src={item.image} alt={item.name} />
            <div className="admin-card-body">
              <div className="admin-card-name">
                {item.name} {item.soldOut && <span style={{color:"var(--ink-soft)", fontSize:11}}>(หมดชั่วคราว)</span>}
              </div>
              <div className="admin-card-price mono">{formatPrice(item.price)} บาท · {item.category}</div>
            </div>
            <div className="admin-actions">
              <div className="icon-btn" title="หมด/มี" onClick={() => toggleSoldOut(item.id)}>
                {item.soldOut ? "🔔" : "🚫"}
              </div>
              <div className="icon-btn" title="แก้ไข" onClick={() => startEdit(item)}>✎</div>
              <div className="icon-btn danger" title="ลบ" onClick={() => remove(item.id)}>🗑</div>
            </div>
          </div>
        ))}
        <button className="add-btn" onClick={startNew}>+ เพิ่มเมนูใหม่</button>
      </div>
    </div>
  );
}

/* ===================================================
   ROOT APP
=================================================== */
function App() {
  const [menu, setMenuState] = useState(loadMenu());
  const [page, setPage] = useState("menu"); // menu | adminLogin | admin
  const [liffReady, setLiffReady] = useState(false);
  const [liffError, setLiffError] = useState(null);

  const setMenu = (newMenu) => {
    setMenuState(newMenu);
    saveMenu(newMenu);
  };

  useEffect(() => {
    async function initLIFF() {
      try {
        if (typeof liff === "undefined") {
          // ไม่มี LIFF SDK (เช่น เปิดทดสอบในเบราว์เซอร์ทั่วไป) - ปล่อยให้ใช้งานต่อได้
          setLiffReady(true);
          return;
        }
        await liff.init({ liffId: window.LIFF_ID });

        if (!liff.isLoggedIn() && !liff.isInClient()) {
          // เปิดจากเบราว์เซอร์นอก LINE และยังไม่ login - ให้ login ก่อน
          liff.login();
          return;
        }

        setLiffReady(true);
      } catch (e) {
        console.error("LIFF init error:", e);
        setLiffError(e);
        // อนุญาตให้ใช้งานต่อได้แม้ LIFF init ไม่สำเร็จ (เช่น เปิดทดสอบนอก LINE)
        setLiffReady(true);
      }
    }
    initLIFF();
  }, []);

  if (!liffReady) {
    return (
      <div className="loading-screen">
        <div className="display" style={{fontSize:20, color:"var(--ink)"}}>เลิฟชาไทย</div>
        <div>กำลังโหลด...</div>
      </div>
    );
  }

  if (page === "menu") {
    return <MenuPage menu={menu} onGoAdmin={() => setPage("adminLogin")} />;
  }
  if (page === "adminLogin") {
    return <AdminLogin onSuccess={() => setPage("admin")} onBack={() => setPage("menu")} />;
  }
  return <AdminPage menu={menu} setMenu={setMenu} onBack={() => setPage("menu")} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
